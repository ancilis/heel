name: Publish to PyPI

# Publishes heel-sim to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC) — NO API token is stored anywhere. One-time setup on PyPI:
#   PyPI → your project (or "pending publisher") → Publishing → add a GitHub publisher:
#     owner: ancilis   repo: heel   workflow: publish.yml   environment: pypi
# Then publish a GitHub Release and this workflow uploads the wheel + sdist.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # PyPI Trusted Publishing (OIDC) + provenance signing
      contents: read
      attestations: write   # signed build-provenance attestation for the artifacts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Generate SBOM (CycloneDX)
        run: |
          python -m pip install --upgrade cyclonedx-bom
          cyclonedx-py environment -o dist/sbom.cdx.json || true
      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*.whl, dist/*.tar.gz"
      - name: Publish to PyPI (trusted publishing — no token stored)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # upload PEP 740 attestations to PyPI
